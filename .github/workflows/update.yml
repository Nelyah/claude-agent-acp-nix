name: Update claude-agent-acp

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest release version
        id: latest
        run: |
          LATEST=$(curl -s https://api.github.com/repos/agentclientprotocol/claude-agent-acp/releases/latest | jq -r .tag_name | sed 's/^v//')
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Get current version
        id: current
        run: |
          CURRENT=$(grep 'version = "' flake.nix | head -1 | sed 's/.*version = "\(.*\)".*/\1/')
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Check if update needed
        id: check
        run: |
          if [ "${{ steps.latest.outputs.version }}" = "${{ steps.current.outputs.version }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version and hashes
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.latest.outputs.version }}"
          BASE_URL="https://github.com/agentclientprotocol/claude-agent-acp/releases/download/v${VERSION}"

          declare -A ARTIFACTS=(
            ["x86_64-linux"]="claude-agent-acp-linux-x64.tar.gz"
            ["aarch64-linux"]="claude-agent-acp-linux-arm64.tar.gz"
            ["x86_64-darwin"]="claude-agent-acp-darwin-x64.zip"
            ["aarch64-darwin"]="claude-agent-acp-darwin-arm64.zip"
          )

          for system in "${!ARTIFACTS[@]}"; do
            artifact="${ARTIFACTS[$system]}"
            url="${BASE_URL}/${artifact}"
            hash=$(curl -sL "$url" | sha256sum | awk '{print $1}')
            sri="sha256-$(echo "$hash" | xxd -r -p | base64 -w0)"
            sed -i "/${system}/,/hash =/{s|hash = \"sha256-[^\"]*\"|hash = \"${sri}\"|}" flake.nix
          done

          sed -i "0,/version = \"[^\"]*\"/s/version = \"[^\"]*\"/version = \"${VERSION}\"/" flake.nix

      - name: Extract binary for scanning
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.latest.outputs.version }}"
          mkdir -p scan
          curl -sL "https://github.com/agentclientprotocol/claude-agent-acp/releases/download/v${VERSION}/claude-agent-acp-linux-x64.tar.gz" | tar xz -C scan

      - name: Scan for vulnerabilities
        if: steps.check.outputs.skip == 'false'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: rootfs
          scan-ref: scan
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "update claude-agent-acp to v${{ steps.latest.outputs.version }}"
          git push
