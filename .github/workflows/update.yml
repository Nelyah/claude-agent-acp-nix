name: Update claude-agent-acp

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -euo pipefail {0}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest release version
        id: latest
        run: |
          LATEST=$(curl -fsSL https://registry.npmjs.org/@agentclientprotocol/claude-agent-acp/latest | jq -r .version)
          [[ "$LATEST" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "invalid version: $LATEST" >&2; exit 1; }
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Get current version
        id: current
        run: |
          CURRENT=$(grep 'version = "' flake.nix | head -1 | sed 's/.*version = "\(.*\)".*/\1/')
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Check if update needed
        id: check
        run: |
          if [ "${{ steps.latest.outputs.version }}" = "${{ steps.current.outputs.version }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version and hashes
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.latest.outputs.version }}"

          SRC_BASE32=$(nix-prefetch-url --unpack "https://github.com/agentclientprotocol/claude-agent-acp/archive/refs/tags/v${VERSION}.tar.gz")
          SRC_HASH=$(nix hash convert --hash-algo sha256 --to sri "$SRC_BASE32")
          [[ "$SRC_HASH" =~ ^sha256- ]] || { echo "invalid SRC_HASH: $SRC_HASH" >&2; exit 1; }

          mkdir -p scan
          curl -fsSL -o scan/package-lock.json "https://raw.githubusercontent.com/agentclientprotocol/claude-agent-acp/v${VERSION}/package-lock.json"
          NPM_HASH=$(nix run nixpkgs#prefetch-npm-deps -- scan/package-lock.json)
          [[ "$NPM_HASH" =~ ^sha256- ]] || { echo "invalid NPM_HASH: $NPM_HASH" >&2; exit 1; }

          sed -i "s|^\(      \)version = \"[^\"]*\";|\1version = \"${VERSION}\";|" flake.nix
          sed -i "s|srcHash = \"[^\"]*\"|srcHash = \"${SRC_HASH}\"|" flake.nix
          sed -i "s|npmDepsHash = \"[^\"]*\"|npmDepsHash = \"${NPM_HASH}\"|" flake.nix

      - name: Build package
        if: steps.check.outputs.skip == 'false'
        run: nix build --print-build-logs

      - name: Scan for vulnerabilities
        if: steps.check.outputs.skip == 'false'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: scan
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "update claude-agent-acp to v${{ steps.latest.outputs.version }}"
          git push
